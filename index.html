<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ExpiLingo</title>
<style>
body { font-family: Arial; margin:0; background: linear-gradient(135deg,#0a0f1f,#020617); color:white; text-align:center; }
header { background:#111827; padding:20px; font-size:30px; font-weight:bold; color:#22c55e; }
section { padding:60px 20px; }
h1 { font-size:40px; }
hr { width:200px; margin:10px auto 30px; border:1px solid #22c55e; }
.slogan span { color:#38bdf8; text-decoration:underline; }
.servicios p { margin:8px; font-size:18px; }
.pasos { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.paso { background:#1e293b; padding:20px; width:220px; border-radius:15px; transition:0.3s; }
.paso:hover { transform:translateY(-8px); background:#38bdf8; color:black; }
.precios { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.card { background:#1e293b; padding:20px; width:220px; border-radius:20px; transition:all 0.3s ease; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
.card:hover { transform:translateY(-10px) scale(1.05); background:#22c55e; color:black; }
.precio { font-size:22px; font-weight:bold; margin:10px 0; }
.btn-pay { margin-top:10px; padding:10px 15px; background:#22c55e; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
.btn-pay:hover { background:#16a34a; }

#qr-overlay {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:1000;
}

#qr-overlay img {
  max-width:250px;
  margin:20px 0;
  border:5px solid white;
  border-radius:15px;
}

#qr-overlay button {
  margin-top:10px;
}
</style>
</head>
<body>

<header>🌎 ExpiLingo</header>

<section>
<h1 class="slogan">No te enseñamos qué pensar. Te enseñamos <span>cómo</span> pensar</h1>
<p>Ayuda bilingüe para estudiantes.</p>
</section>

<section>
<h2>Precios</h2>
<hr>
<div class="precios" id="precios-container"></div>
</section>

<!-- Overlay QR -->
<div id="qr-overlay">
  <p>Escanea el código con Nequi y realiza el pago</p>

  <img src="qr-nequi.png" alt="Código QR Nequi">

  <p>Después de pagar, envíanos tu comprobante por WhatsApp 📩</p>

  <a href="https://wa.me/573102270396" target="_blank">
    <button class="btn-pay">Enviar comprobante</button>
  </a>

  <button onclick="closeQR()">Cerrar</button>
</div>

<script>
const precios = [
{titulo:"30 min", precio:20000},
{titulo:"1 hora", precio:30000},
{titulo:"Básico", precio:15000},
{titulo:"Estándar", precio:25000},
{titulo:"Pro", precio:75000}
];

const container = document.getElementById("precios-container");

precios.forEach(item=>{
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML = `
    <h3>${item.titulo}</h3>
    <p class="precio">$${item.precio.toLocaleString()}</p>
    <button class="btn-pay">Pagar con Nequi</button>
  `;
  container.appendChild(card);
});

document.querySelectorAll('.btn-pay').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.getElementById('qr-overlay').style.display='flex';
  });
});

function closeQR(){
  document.getElementById('qr-overlay').style.display='none';
}
</script>

</body>
</html>
